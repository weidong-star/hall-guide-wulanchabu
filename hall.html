<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政务服务大厅 - 政务服务大厅导览</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <h1 class="hall-name" id="hallName">政务服务大厅</h1>
                <button class="voice-btn" id="voiceBtn" title="语音播报">
                    <span class="icon">🔊</span>
                </button>
            </div>
        </header>

        <!-- 大厅基本信息 -->
        <section class="hall-info" id="hallInfo">
            <div class="info-card">
                <img class="hall-image" id="hallImage" src="" alt="大厅实景" onerror="this.style.display='none'">
                <div class="info-content">
                    <div class="info-item">
                        <span class="label">📍 地址：</span>
                        <span class="value" id="address">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">📞 电话：</span>
                        <span class="value" id="phone">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">🕐 办公时间：</span>
                        <span class="value" id="workTime">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">🏢 入驻单位：</span>
                        <span class="value" id="units">-</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 温馨提示 -->
        <section class="notice" id="notice" style="display: none;">
            <div class="notice-content">
                <span class="notice-icon">📢</span>
                <span class="notice-text" id="noticeText"></span>
            </div>
        </section>

        <!-- 窗口信息 -->
        <section class="section">
            <h2 class="section-title">🪟 办事窗口</h2>
            <div class="windows-list" id="windowsList">
                <!-- 窗口列表动态生成 -->
            </div>
        </section>

        <!-- 事项清单 -->
        <section class="section">
            <h2 class="section-title">📋 办事事项</h2>
            
            <!-- 搜索和筛选区 -->
            <div class="items-filter">
                <div class="search-box">
                    <input type="text" id="itemSearch" placeholder="搜索事项名称或所属单位..." class="search-input">
                    <button class="search-btn" onclick="searchItems()">🔍 搜索</button>
                </div>
                <div class="filter-box">
                    <label>筛选单位：</label>
                    <select id="unitFilter" class="filter-select" onchange="filterItems()">
                        <option value="">全部单位</option>
                    </select>
                </div>
            </div>
            
            <!-- 事项列表 -->
            <div class="items-list" id="itemsList">
                <!-- 事项列表动态生成 -->
            </div>
        </section>

        <!-- 事项详情弹窗 -->
        <div class="modal" id="itemModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title" id="modalTitle">事项详情</h3>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- 详情内容动态生成 -->
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <footer class="footer">
            <p>如有疑问，请咨询大厅服务台</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
